name: Python CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: python -m pip install -e .[dev]
      - name: Run tests
        run: python -m pytest
      - name: Run benchmark smoke command
        run: cuc-habitat run --agent alpha --turns 3 --seed 1 --no-render
